name: Daily NESCO Balance Tracker

on:
  schedule:
    - cron: '0 1 * * *' # প্রতিদিন বাংলাদেশ সময় সকাল ৭টায় অটো রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার বাটন অন রাখবে

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper
        run: python main.py
