name: Daily NESCO Balance Tracker

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Chrome and Virtual Display (Xvfb)
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable xvfb

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scraper with Virtual Display
        run: xvfb-run -a python main.py
